<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Room Members — C Squared</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Serif+Display&display=swap" rel="stylesheet" />
        <link rel="stylesheet" href="/styles.css" />
    </head>
    <body>
        <div id="navbar"></div>

        <main class="page-content-sm">
            <div class="settings-back">
                <button class="btn-back" id="backBtn">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
                    Back to Room
                </button>
            </div>

            <div class="auth-card">
                <div class="auth-header">
                    <h1>Members</h1>
                    <p id="memberCount" class="member-count-label"></p>
                </div>

                <p id="error" class="members-error"></p>
                <div id="members" class="members-list"></div>
            </div>
        </main>

        <script>
            const urlParams = new URLSearchParams(window.location.search);
            const roomId = urlParams.get("id");
            document.getElementById("backBtn").onclick = () => {
                window.location.href = `/room.html?id=${roomId}`;
            };
        </script>

        <script src="/navbar.js"></script>
        <script src="/members.js"></script>
    </body>
</html>
