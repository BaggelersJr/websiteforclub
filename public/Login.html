<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <form method="get" name="loginForm" id="loginForm">
    <img src="csquared-removebg-preview.png" id = "logo">
    <form method="get" name="loginForm" id="loginForm" action="/MyAccount.html">
      <div class="card">
        <h2>Username</h2>
        <input id="username" name="username" type="text" placeholder="Username or Email" required/>
        <h2>Password</h2>
        <input id="password" name="password" type="password" placeholder="Password" required/>
        <p id="error" style="color: red"></p>
        <button type="submit" id="Login">Login</button>
        <input id="pwd" type="password" name="password" placeholder="Password" value="" required="true" maxlength="12" minlength="5"  min="5" max="12"/>
        <a href="ForgotPwd.html">Forgot Password</a>
        <button type="submit" id="Login" value="Submit">Login</button>
        <a href="Signup.html">Sign up</a> <br />
      </div>
    </form>
  </body>
  <script src="/navbar.js"></script>
  <script src="/Login.js"></script>
</html>
