<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SignUp</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="navbar"></div>
    <div class="card">
      <form id="signupForm">
        <h2>Enter Email</h2>
        <input id="email" type="text" placeholder="email"/>
        <h2>Create Username</h2>
        <input id="username" type="text" placeholder="username"/>
        <h2>Create Password</h2>
        <input id="password" type="password" class="form-control" placeholder="password"/>
    <img src="csquared-removebg-preview.png" id = "logo">
    <div class="card">
      <form id="signupForm" method="get" action="/MyAccount.html">
        <h2>Enter Email</h2>
        <input type="text" placeholder="Email" required="true" pattern="+@gmail.com" />
        <h2>Create Username</h2>
        <input id="un" name="username" type="text" placeholder="Username" required="true" min="3" max="20" minlength="3" maxlength="15"/>
        <h2>Create Password</h2>
        <input id="pwd" type="password" name="password" placeholder="Password" value="" required="true" maxlength="12" minlength="5" min="5" max="12"/>
        <p id="error" style="color: red"></p>
        <button type="submit" value="Submit" id="Submit">Submit</button>
      </form>
    </div>
  </body>
  <script src="/navbar.js"></script>
  <script src="/Signup.js"></script>
</html>
